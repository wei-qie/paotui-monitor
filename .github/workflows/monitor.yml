name: 跑腿派单监控

on:
  workflow_dispatch:           # 由 cron-job.org 每 5 分钟触发

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Run monitor check
        env:
          RUN_ONCE: '1'
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python monitor.py

      - name: Commit notified tasks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f notified_tasks.json ]; then
            git config user.name "monitor-bot"
            git config user.email "bot@users.noreply.github.com"
            git add notified_tasks.json
            if git diff --cached --quiet; then
              echo "没有新通知记录，跳过提交"
            else
              git commit -m "update notified tasks [skip ci]"
              git pull --rebase
              git push
            fi
          else
            echo "notified_tasks.json 不存在，跳过提交"
          fi
